<!DOCTYPE html>
<html>
<head>
    <title>SixPack Panel Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1e1e1e; color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 30px; }
        
        .device-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .device-item {
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .device-item.connected {
            background: linear-gradient(135deg, #1a3a1a 0%, #2d2d2d 100%);
            border: 2px solid #00aa00;
        }
        .device-item:hover { background: #333; border-color: #0066cc; }
        .device-item.connected:hover { background: linear-gradient(135deg, #226622 0%, #333 100%); border-color: #00ff00; }
        .xplane-item {
            background: linear-gradient(135deg, #1a3a1a 0%, #2d2d2d 100%);
            border: 2px solid #00aa00;
            grid-column: 1 / -1;
        }
        .xplane-item:hover { background: linear-gradient(135deg, #226622 0%, #333 100%); border-color: #00ff00; }
        .device-name { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .device-info { font-size: 12px; color: #aaa; margin: 5px 0; }
        .xplane-item .device-info { color: #00cc00; }
        
        .calibration-page { display: none; }
        .calibration-page.active { display: block; }
        .back-btn {
            background: #444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .back-btn:hover { background: #555; }
        
        .cal-card {
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            max-width: 900px;
        }
        .cal-header { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        .cal-info { font-size: 12px; color: #aaa; margin-bottom: 15px; }
        
        .controls {
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .motor-section { 
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 15px;
        }
        .motor-section h3 { margin-bottom: 15px; color: #0066cc; }
        .gauge-container { position: relative; width: 200px; height: 200px; margin: 0 auto 15px; }
        .gauge-value { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; font-weight: bold; }
        
        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        input[type="number"] { width: 80px; padding: 5px; background: #1e1e1e; border: 1px solid #444; color: #fff; }
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        button:hover { background: #0052a3; }
        
        .motor-buttons { display: flex; gap: 10px; margin-top: 10px; }
        
        .calibration {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 15px;
            margin-top: 15px;
        }
        .cal-title { font-weight: bold; margin-bottom: 10px; }
        .cal-point {
            display: flex;
            gap: 5px;
            margin: 8px 0;
            align-items: center;
        }
        .cal-point input { flex: 1; padding: 4px; background: #2d2d2d; border: 1px solid #444; color: #fff; }
        .cal-point button { padding: 4px 8px; background: #aa0000; }
        .cal-point button:hover { background: #cc0000; }
        .add-point-btn { margin-top: 10px; width: 100%; }
        
        .encoder-display {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 20px;
            margin-top: 15px;
            display: none;
        }
        .encoder-display.active {
            display: block;
        }
        .encoder-item {
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .encoder-name {
            font-size: 16px;
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 10px;
        }
        .encoder-value {
            font-size: 24px;
            font-weight: bold;
            color: #00aa00;
            margin-bottom: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="landing-page">
            <h1>SixPack Panel Monitor</h1>
            <div class="device-list" id="device-list"></div>
        </div>

        <div id="calibration-page" class="calibration-page">
            <button class="back-btn" onclick="goBack()">← Back</button>
            <div class="cal-card">
                <div class="cal-header" id="cal-device-name"></div>
                <div class="cal-info">IP: <span id="cal-device-ip"></span></div>
                <div class="cal-info">Last seen: <span id="cal-device-lastseen"></span></div>
                <div class="cal-info">Uptime: <span id="cal-device-uptime"></span>s</div>
                
                <div class="controls" id="motor-controls"></div>
                <div class="encoder-display" id="encoder-display"></div>
                
                <div class="calibration">
                    <div class="cal-title">Calibration Points</div>
                    <div id="cal-points"></div>
                    <button class="add-point-btn" onclick="addCalibrationPoint()">+ Add Point</button>
                    <button onclick="saveCalibration()" style="margin-top: 10px; width: 100%;">Save Calibration</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function drawGauge(canvasId, angle, espId, motorId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const centerX = 100, centerY = 100, radius = 90;
            
            const calibrationData = {
                'ESP_Airspeed': [[40, 32], [60, 72], [80, 116], [100, 161], [120, 203], [160, 265], [200, 315]],
                'ESP_VertSpeed': [[2000, 82], [1500, 37], [1000, 358], [500, 314], [0, 270], [-500, 228], [-1000, 185], [-1500, 143], [-2000, 98]],
                'ESP_Altimeter': [[0, 0], [10000, 90], [20000, 180], [30000, 270]]
            };
            const calPoints = calibrationData[espId] || [];
            
            ctx.clearRect(0, 0, 200, 200);
            ctx.strokeStyle = '#0066cc';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.stroke();
            
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            ctx.fillStyle = '#aaa';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            for (let i = 0; i < 360; i += 30) {
                const rad = (i - 90) * Math.PI / 180;
                const x1 = centerX + (radius - 10) * Math.cos(rad);
                const y1 = centerY + (radius - 10) * Math.sin(rad);
                const x2 = centerX + radius * Math.cos(rad);
                const y2 = centerY + radius * Math.sin(rad);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                
                const labelX = centerX + (radius + 15) * Math.cos(rad);
                const labelY = centerY + (radius + 15) * Math.sin(rad);
                ctx.fillText(i + '°', labelX, labelY);
            }
            
            ctx.fillStyle = '#0066cc';
            ctx.font = '9px Arial';
            for (const [value, anglePos] of calPoints) {
                const rad = (anglePos - 90) * Math.PI / 180;
                const labelX = centerX + (radius - 25) * Math.cos(rad);
                const labelY = centerY + (radius - 25) * Math.sin(rad);
                ctx.fillText(value, labelX, labelY);
            }
            
            const needleRad = (angle - 90) * Math.PI / 180;
            const needleX = centerX + (radius - 20) * Math.cos(needleRad);
            const needleY = centerY + (radius - 20) * Math.sin(needleRad);
            ctx.strokeStyle = '#ff6600';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(needleX, needleY);
            ctx.stroke();
            
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
            ctx.fill();
        }

        let currentDevice = null;
        let calibrationPoints = [];

        function updateDeviceList() {
            fetch('/api/devices')
                .then(r => r.json())
                .then(devices => {
                    const html = devices.map(d => {
                        if (d.is_xplane) {
                            return `<div class="device-item xplane-item" onclick="selectDevice('${d.id}')">
                                <div class="device-name">${d.id} 🛩️</div>
                                <div class="device-info">Data source for X-Plane</div>
                                <div class="device-info">Total DREF messages: ${d.xplane_messages || 0}</div>
                            </div>`;
                        } else {
                            const connectedClass = d.online ? 'connected' : '';
                            return `<div class="device-item ${connectedClass}" onclick="selectDevice('${d.id}')">
                                <div class="device-name">${d.id}</div>
                                <div class="device-info">IP: ${d.ip}</div>
                                <div class="device-info">Last seen: ${d.last_seen}</div>
                                <div class="device-info">Uptime: ${d.uptime}s</div>
                                <div class="device-info">X-Plane messages: ${d.xplane_messages || 0}</div>
                            </div>`;
                        }
                    }).join('');
                    document.getElementById('device-list').innerHTML = html;
                });
        }

        function updateEncoderDisplay() {
            fetch('/api/devices')
                .then(r => r.json())
                .then(devices => {
                    const device = devices.find(d => d.id === 'ESP_Inputs');
                    if (device && device.encoders && Object.keys(device.encoders).length > 0) {
                        const html = Object.entries(device.encoders).map(([name, data]) => `
                            <div class="encoder-item">
                                <div class="encoder-name">${name}</div>
                                <div class="encoder-value">${data.value !== undefined ? data.value : 'N/A'}</div>
                                <div class="device-info">Button: ${data.button !== undefined ? data.button : 'N/A'}</div>
                            </div>
                        `).join('');
                        document.getElementById('encoder-display').innerHTML = html;
                    } else {
                        document.getElementById('encoder-display').innerHTML = '<div class="device-info">No encoder events yet</div>';
                    }
                });
        }

        function selectDevice(espId) {
            currentDevice = espId;
            
            if (espId === 'X-Plane') {
                fetch('/api/devices')
                    .then(r => r.json())
                    .then(devices => {
                        const device = devices.find(d => d.id === espId);
                        if (device) {
                            document.getElementById('cal-device-name').textContent = '🛩️ ' + device.id;
                            document.getElementById('cal-device-ip').textContent = 'Network data source';
                            document.getElementById('cal-device-lastseen').textContent = 'Real-time';
                            document.getElementById('cal-device-uptime').textContent = 'Active';
                            
                            document.querySelector('.controls').style.display = 'none';
                            document.querySelector('.calibration').style.display = 'none';
                            document.getElementById('encoder-display').classList.add('active');
                            
                            document.getElementById('landing-page').style.display = 'none';
                            document.getElementById('calibration-page').classList.add('active');
                        }
                    });
                return;
            }
            
            fetch('/api/devices')
                .then(r => r.json())
                .then(devices => {
                    const device = devices.find(d => d.id === espId);
                    if (device) {
                        document.getElementById('cal-device-name').textContent = device.id;
                        document.getElementById('cal-device-ip').textContent = device.ip;
                        document.getElementById('cal-device-lastseen').textContent = device.last_seen;
                        document.getElementById('cal-device-uptime').textContent = device.uptime;
                        
                        fetch(`/api/device-info/${espId}`)
                            .then(r => r.json())
                            .then(info => {
                                if (info.motor_count === 0) {
                                    document.querySelector('.controls').style.display = 'none';
                                    document.querySelector('.calibration').style.display = 'none';
                                    document.getElementById('encoder-display').classList.add('active');
                                    updateEncoderDisplay();
                                } else {
                                    document.querySelector('.controls').style.display = 'grid';
                                    document.querySelector('.calibration').style.display = 'block';
                                    document.getElementById('encoder-display').classList.remove('active');
                                    renderMotorControls(espId, info.motor_count || 1);
                                }
                            });
                        
                        fetch(`/api/calibration/${espId}`)
                            .then(r => r.json())
                            .then(cal => {
                                calibrationPoints = cal.points || [];
                                renderCalibrationPoints();
                            });
                        
                        document.getElementById('landing-page').style.display = 'none';
                        document.getElementById('calibration-page').classList.add('active');
                    }
                });
        }

        function renderMotorControls(espId, motorCount) {
            const controlsDiv = document.getElementById('motor-controls');
            let html = '';
            
            for (let m = 0; m < motorCount; m++) {
                const motorNum = m + 1;
                const isAltimeter = espId === 'ESP_Altimeter' && m === 0;
                const isVSI = espId === 'ESP_VertSpeed';
                const motorId = m;
                
                html += `<div class="motor-section">
                    <h3>Motor ${motorNum}${isVSI ? ' (Vertical Speed)' : ''}</h3>
                    <div class="gauge-container">
                        <canvas id="gauge-motor-${motorId}" width="200" height="200"></canvas>
                        <div class="gauge-value" id="gauge-value-motor-${motorId}">0°</div>
                    </div>
                    <div class="slider-group">
                        <label>Angle (deg):</label>
                        <input type="number" id="cal-angle-motor-${motorId}" value="0" min="-3600" max="3600" onchange="updateGaugePreview(${motorId})">
                        <button onclick="moveMotor.call(this, ${motorId})" style="padding: 5px 10px; font-size: 11px;">Move</button>
                    </div>
                    <div class="slider-group">
                        <label>X-Plane:</label>
                        <input type="number" id="cal-xplane-motor-${motorId}" value="0" onchange="updateGaugeFromXPlane(${motorId})">
                        <button onclick="moveXPlane.call(this, ${motorId})" style="padding: 5px 10px; font-size: 11px;">Move</button>
                    </div>
                    <div class="motor-buttons">
                        <button onclick="rotateCW.call(this, ${motorId})" style="background: #00aa00;">CW 10°</button>
                        <button onclick="rotateCCW.call(this, ${motorId})" style="background: #aa0000;">CCW 10°</button>
                        <button onclick="zeroMotor.call(this, ${motorId})" style="background: #666;">Zero</button>
                    </div>
                </div>`;
            }
            
            controlsDiv.innerHTML = html;
            
            for (let m = 0; m < motorCount; m++) {
                const input = document.getElementById(`cal-angle-motor-${m}`);
                if (input) {
                    const initialAngle = espId === 'ESP_VertSpeed' ? 270 : 0;
                    input.value = initialAngle;
                    drawGauge(`gauge-motor-${m}`, initialAngle, espId, m);
                }
            }
        }

        function renderCalibrationPoints() {
            const html = calibrationPoints.map((p, i) => `
                <div class="cal-point">
                    <input type="number" placeholder="Value" value="${p.value}" onchange="calibrationPoints[${i}].value = parseInt(this.value)">
                    <input type="number" placeholder="Angle" value="${p.angle}" onchange="calibrationPoints[${i}].angle = parseInt(this.value)">
                    <button onclick="deleteCalibrationPoint(${i})">Delete</button>
                </div>
            `).join('');
            document.getElementById('cal-points').innerHTML = html;
        }

        function addCalibrationPoint() {
            calibrationPoints.push({value: 0, angle: 0});
            renderCalibrationPoints();
        }

        function deleteCalibrationPoint(idx) {
            calibrationPoints.splice(idx, 1);
            renderCalibrationPoints();
        }

        function goBack() {
            currentDevice = null;
            document.getElementById('landing-page').style.display = 'block';
            document.getElementById('calibration-page').classList.remove('active');
            updateDeviceList();
        }

        function updateGaugePreview(motorId) {
            const input = document.getElementById(`cal-angle-motor-${motorId}`);
            const valueDisplay = document.getElementById(`gauge-value-motor-${motorId}`);
            valueDisplay.textContent = input.value + '°';
            drawGauge(`gauge-motor-${motorId}`, parseFloat(input.value), currentDevice, motorId);
        }

        function updateGaugeFromAltitude(motorId) {
            const altitudeInput = document.getElementById(`cal-altitude-motor-${motorId}`);
            const input = document.getElementById(`cal-angle-motor-${motorId}`);
            const valueDisplay = document.getElementById(`gauge-value-motor-${motorId}`);
            const altitude = parseInt(altitudeInput.value);
            const angle = (altitude % 1000) * 0.36;
            input.value = angle;
            valueDisplay.textContent = angle.toFixed(1) + '°';
            drawGauge(`gauge-motor-${motorId}`, angle, currentDevice, motorId);
        }

        function updateGaugeFromXPlane(motorId) {
            const input = document.getElementById(`cal-angle-motor-${motorId}`);
            const valueDisplay = document.getElementById(`gauge-value-motor-${motorId}`);
            const xplaneInput = document.getElementById(`cal-xplane-motor-${motorId}`);
            const value = parseInt(xplaneInput.value);
            fetch('/api/xplane-convert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ esp_id: currentDevice, motor_id: motorId, value: value })
            }).then(r => r.json()).then(data => {
                if (data.status === 'ok') {
                    input.value = data.angle;
                    valueDisplay.textContent = data.angle + '°';
                    drawGauge(`gauge-motor-${motorId}`, data.angle, currentDevice, motorId);
                }
            });
        }

        function updateGaugeFromFPS(motorId) {
            const input = document.getElementById(`cal-angle-motor-${motorId}`);
            const valueDisplay = document.getElementById(`gauge-value-motor-${motorId}`);
            const fpsInput = document.getElementById(`cal-xplane-motor-${motorId}`);
            const fps = parseInt(fpsInput.value);
            const vsiCal = [[2000, 82], [1500, 37], [1000, 358], [500, 314], [0, 270], [-500, 228], [-1000, 185], [-1500, 143], [-2000, 98]];
            let angle = 270;
            for (let i = 0; i < vsiCal.length - 1; i++) {
                const [v1, a1] = vsiCal[i];
                const [v2, a2] = vsiCal[i + 1];
                if ((v1 >= fps && fps >= v2) || (v2 >= fps && fps >= v1)) {
                    const ratio = (fps - v1) / (v2 - v1);
                    angle = a1 + ratio * (a2 - a1);
                    break;
                }
            }
            input.value = angle.toFixed(1);
            valueDisplay.textContent = angle.toFixed(1) + '°';
            drawGauge(`gauge-motor-${motorId}`, angle, currentDevice, motorId);
        }

        function moveMotor(motorId = 0) {
            const angle = parseFloat(document.getElementById(`cal-angle-motor-${motorId}`).value);
            fetch('/api/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ esp_id: currentDevice, motor_id: motorId, angle: angle, min_angle: 0, max_angle: 360 })
            });
        }

        function moveXPlane(motorId = 0) {
            const value = parseInt(document.getElementById(`cal-xplane-motor-${motorId}`).value);
            fetch('/api/xplane-convert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ esp_id: currentDevice, motor_id: motorId, value: value })
            }).then(r => r.json()).then(data => {
                if (data.status === 'ok') {
                    document.getElementById(`cal-angle-motor-${motorId}`).value = data.angle;
                    document.getElementById(`gauge-value-motor-${motorId}`).textContent = data.angle + '°';
                    drawGauge(`gauge-motor-${motorId}`, data.angle, currentDevice, motorId);
                }
            });
        }

        function moveVSI(motorId = 0) {
            const fps = parseInt(document.getElementById(`cal-xplane-motor-${motorId}`).value);
            fetch('/api/move-vsi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ esp_id: currentDevice, motor_id: motorId, fps: fps })
            }).then(r => r.json()).then(data => {
                if (data.status === 'ok') {
                    document.getElementById(`cal-angle-motor-${motorId}`).value = data.angle;
                    document.getElementById(`gauge-value-motor-${motorId}`).textContent = data.angle + '°';
                    drawGauge(`gauge-motor-${motorId}`, data.angle, currentDevice, motorId);
                }
            });
        }

        function rotateCW(motorId) {
            const input = document.getElementById(`cal-angle-motor-${motorId}`);
            let angle = parseFloat(input.value) + 10;
            input.value = angle;
            updateGaugePreview(motorId);
            moveMotor(motorId);
        }

        function rotateCCW(motorId) {
            const input = document.getElementById(`cal-angle-motor-${motorId}`);
            let angle = parseFloat(input.value) - 10;
            input.value = angle;
            updateGaugePreview(motorId);
            moveMotor(motorId);
        }

        function zeroMotor(motorId) {
            fetch('/api/zero', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ esp_id: currentDevice, motor_id: motorId })
            });
            const input = document.getElementById(`cal-angle-motor-${motorId}`);
            const valueDisplay = document.getElementById(`gauge-value-motor-${motorId}`);
            input.value = 0;
            valueDisplay.textContent = '0°';
            drawGauge(`gauge-motor-${motorId}`, 0);
        }

        function saveCalibration() {
            const cal = { points: calibrationPoints, motor1: { min: 0, max: 360 } };
            fetch(`/api/calibration/${currentDevice}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cal)
            });
        }

        updateDeviceList();
        setInterval(updateDeviceList, 1000);
        setInterval(() => {
            if (currentDevice === 'ESP_Inputs') {
                updateEncoderDisplay();
            }
        }, 500);
    </script>
</body>
</html>
